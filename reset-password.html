<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password | ART de ONE</title>
  <link rel="icon" type="image/svg+xml"
    href="https://res.cloudinary.com/dy7vubtji/image/upload/v1774516236/favicon_epuxyi.svg">
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=Instrument+Serif:ital@0;1&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --accent: #a7e169;
      --accent-dark: #8cca50;
      --bg: #fefffa;
      --surface: #ffffff;
      --border: #e2e3de;
      --text: #1b1c18;
      --text-sub: #6b6c68;
      --text-muted: #9b9c98;
      --hover: #eaebea;
      --radius-sm: 8px;
      --radius-lg: 18px;
      --shadow-md: 0 4px 18px rgba(0, 0, 0, .09), 0 1px 4px rgba(0, 0, 0, .05);
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    }

    [data-theme="dark"] {
      --bg: #052d23;
      --bg-alt: #04241c;
      --surface: #073b2e;
      --border: #0a4a3a;
      --text: #f4f4f4;
      --text-sub: #a0b8b0;
      --text-muted: #608075;
      --hover: #063428;
      --shadow-md: 0 4px 18px rgba(0, 0, 0, .35), 0 1px 4px rgba(0, 0, 0, .22);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background .3s var(--ease-out), color .3s var(--ease-out);
      -webkit-font-smoothing: antialiased;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .nav {
      padding: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-logo {
      height: 32px;
    }

    .theme-btn {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-sub);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s;
    }

    .theme-btn:hover {
      border-color: var(--text-sub);
      color: var(--text);
    }

    .auth-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .auth-card {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 40px;
      box-shadow: var(--shadow-md);
    }

    .auth-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .auth-title {
      font-family: 'Instrument Serif', serif;
      font-size: 32px;
      font-weight: 400;
      margin-bottom: 8px;
      color: var(--text);
    }

    .auth-sub {
      font-size: 14px;
      color: var(--text-sub);
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 8px;
      color: var(--text);
    }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      transition: all .2s;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(167, 225, 105, .1);
    }

    .form-input::placeholder {
      color: var(--text-muted);
    }

    .form-hint {
      font-size: 11.5px;
      color: var(--text-muted);
      margin-top: 5px;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all .2s var(--ease-out);
    }

    .btn-primary {
      background: var(--accent);
      color: #0d1a00;
      margin-top: 24px;
    }

    .btn-primary:hover {
      background: var(--accent-dark);
      transform: translateY(-1px);
      box-shadow: 0 1px 4px rgba(0, 0, 0, .06);
    }

    .btn-primary:disabled {
      opacity: .5;
      cursor: not-allowed;
      transform: none;
    }

    #statusMsg {
      font-size: 13px;
      margin-top: 12px;
      text-align: center;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      display: none;
    }

    #statusMsg.error {
      color: #ef4444;
      background: rgba(239, 68, 68, .08);
      border: 1px solid rgba(239, 68, 68, .2);
    }

    #statusMsg.success {
      color: #22c55e;
      background: rgba(34, 197, 94, .08);
      border: 1px solid rgba(34, 197, 94, .2);
    }

    .auth-footer {
      text-align: center;
      margin-top: 28px;
      font-size: 13px;
      color: var(--text-sub);
    }

    .auth-footer a {
      color: var(--accent);
      font-weight: 500;
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }

    @keyframes spin {
      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <nav class="nav">
    <a href="index.html">
      <img src="https://res.cloudinary.com/dy7vubtji/image/upload/v1774451883/ADO_AI-01_or74hj.png" alt="ART de ONE"
        class="nav-logo" id="navLogo">
    </a>
    <button class="theme-btn" id="themeBtn" aria-label="Toggle theme">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round">
        <circle cx="12" cy="12" r="5" />
        <line x1="12" y1="1" x2="12" y2="3" />
        <line x1="12" y1="21" x2="12" y2="23" />
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
        <line x1="1" y1="12" x2="3" y2="12" />
        <line x1="21" y1="12" x2="23" y2="12" />
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
      </svg>
    </button>
  </nav>

  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-header">
        <h1 class="auth-title">New password</h1>
        <p class="auth-sub">ART de ONE AI Provider</p>
      </div>
      <form id="resetForm">
        <div class="form-group">
          <label class="form-label" for="password">New Password</label>
          <input type="password" id="password" class="form-input" placeholder="••••••••" required minlength="6">
          <p class="form-hint">At least 6 characters</p>
        </div>
        <div class="form-group">
          <label class="form-label" for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" class="form-input" placeholder="••••••••" required minlength="6">
        </div>
        <div id="statusMsg"></div>
        <button type="submit" class="btn btn-primary" id="btnSubmit">
          Update Password
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round">
            <line x1="5" y1="12" x2="19" y2="12" />
            <polyline points="12 5 19 12 12 19" />
          </svg>
        </button>
      </form>
      <div class="auth-footer">
        <a href="login.html">← Back to Sign In</a>
      </div>
    </div>
  </div>

  <script>
    const moonSvg = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
    const sunSvg = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`;
    const lightLogo = 'https://res.cloudinary.com/dy7vubtji/image/upload/v1774451883/ADO_AI-02_lnmqny.png';
    const darkLogo = 'https://res.cloudinary.com/dy7vubtji/image/upload/v1774451883/ADO_AI-01_or74hj.png';
    function syncLogo() {
      const logo = document.getElementById('navLogo');
      if (logo) logo.src = isDark() ? darkLogo : lightLogo;
    }
    function isDark() { return document.documentElement.dataset.theme === 'dark'; }
    function setTheme(dark) {
      document.documentElement.dataset.theme = dark ? 'dark' : 'light';
      localStorage.setItem('ado_theme', dark ? 'dark' : 'light');
      document.getElementById('themeBtn').innerHTML = dark ? sunSvg : moonSvg;
      syncLogo();
    }
    const savedTheme = localStorage.getItem('ado_theme');
    if (savedTheme) setTheme(savedTheme === 'dark'); else setTheme(true);
    document.getElementById('themeBtn').innerHTML = isDark() ? sunSvg : moonSvg;
    syncLogo();
    document.getElementById('themeBtn').addEventListener('click', () => setTheme(!isDark()));
  </script>

  <script type="module">
    import { supabase } from './js/supabase.js';

    const form = document.getElementById('resetForm');
    const btnSubmit = document.getElementById('btnSubmit');
    const statusMsg = document.getElementById('statusMsg');

    function showMsg(text, type) {
      statusMsg.textContent = text;
      statusMsg.className = type;
      statusMsg.style.display = 'block';
    }

    // Disable form until recovery session is confirmed
    btnSubmit.disabled = true;

    // Supabase v2 sends #access_token=...&type=recovery in the URL hash.
    // onAuthStateChange fires PASSWORD_RECOVERY once the SDK exchanges it.
    supabase.auth.onAuthStateChange((event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        // Session is now active — allow the user to submit
        btnSubmit.disabled = false;
      }
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (password !== confirmPassword) {
        showMsg('Passwords do not match.', 'error'); return;
      }

      btnSubmit.disabled = true;
      btnSubmit.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="animation:spin 1s linear infinite"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> Updating...`;

      try {
        const { error } = await supabase.auth.updateUser({ password });
        if (error) throw error;
        showMsg('Password updated! Redirecting to sign in…', 'success');
        setTimeout(() => { window.location.href = 'login.html'; }, 2000);
      } catch (err) {
        showMsg(err.message || 'Failed to update password.', 'error');
        btnSubmit.disabled = false;
        btnSubmit.innerHTML = `Update Password <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>`;
      }
    });
  </script>
</body>

</html>
