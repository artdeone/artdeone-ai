<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In | ART de ONE</title>
  <link rel="icon" type="image/svg+xml"
    href="https://res.cloudinary.com/dy7vubtji/image/upload/v1774516236/favicon_epuxyi.svg">
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=Instrument+Serif:ital@0;1&display=swap"
    rel="stylesheet" />

  <style>
    :root {
      --accent: #a7e169;
      --accent-dark: #8cca50;
      --bg: #fefffa;
      --bg-alt: #f4f5f0;
      --surface: #ffffff;
      --border: #e2e3de;
      --text: #1b1c18;
      --text-sub: #6b6c68;
      --text-muted: #9b9c98;
      --hover: #eaebea;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 18px;
      --shadow-sm: 0 1px 4px rgba(0, 0, 0, .06), 0 1px 2px rgba(0, 0, 0, .04);
      --shadow-md: 0 4px 18px rgba(0, 0, 0, .09), 0 1px 4px rgba(0, 0, 0, .05);
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    }

    [data-theme="dark"] {
      --bg: #052d23;
      --bg-alt: #04241c;
      --surface: #073b2e;
      --border: #0a4a3a;
      --text: #f4f4f4;
      --text-sub: #a0b8b0;
      --text-muted: #608075;
      --hover: #063428;
      --shadow-sm: 0 1px 4px rgba(0, 0, 0, .25), 0 1px 2px rgba(0, 0, 0, .18);
      --shadow-md: 0 4px 18px rgba(0, 0, 0, .35), 0 1px 4px rgba(0, 0, 0, .22);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background .3s var(--ease-out), color .3s var(--ease-out);
      -webkit-font-smoothing: antialiased;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    /* ── Nav ── */
    .nav {
      padding: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-logo {
      height: 28px;
    }

    .theme-btn {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-sub);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s;
    }

    .theme-btn:hover {
      border-color: var(--text-sub);
      color: var(--text);
    }

    /* ── Auth Container ── */
    .auth-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .auth-card {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 40px;
      box-shadow: var(--shadow-md);
    }

    .auth-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .auth-title {
      font-family: 'Instrument Serif', serif;
      font-size: 32px;
      font-weight: 400;
      margin-bottom: 8px;
      color: var(--text);
    }

    .auth-sub {
      font-size: 14px;
      color: var(--text-sub);
    }

    /* ── Form ── */
    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 8px;
      color: var(--text);
    }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      transition: all .2s;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(167, 225, 105, .1);
    }

    .form-input::placeholder {
      color: var(--text-muted);
    }

    .btn {
      width: 100%;
      padding: 12px;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all .2s var(--ease-out);
    }

    .btn-primary {
      background: var(--accent);
      color: #0d1a00;
      margin-top: 24px;
    }

    .btn-primary:hover {
      background: var(--accent-dark);
      transform: translateY(-1px);
      box-shadow: var(--shadow-sm);
    }

    /* ── Social Auth ── */
    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 24px 0;
      color: var(--text-muted);
      font-size: 12px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--border);
    }

    .divider::before {
      margin-right: 12px;
    }

    .divider::after {
      margin-left: 12px;
    }

    .btn-social {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      margin-bottom: 12px;
    }

    .btn-social:hover {
      background: var(--hover);
      border-color: var(--text-sub);
    }

    .btn-social svg {
      width: 18px;
      height: 18px;
    }

    .auth-footer {
      text-align: center;
      margin-top: 32px;
      font-size: 13px;
      color: var(--text-sub);
    }

    .auth-footer a {
      color: var(--accent);
      font-weight: 500;
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }

    /* Error message */
    #errorMsg {
      color: #ef4444;
      font-size: 13px;
      margin-top: 12px;
      text-align: center;
      display: none;
    }
  </style>
</head>

<body>

  <nav class="nav">
    <a href="index.html">
      <img src="https://res.cloudinary.com/dy7vubtji/image/upload/v1774451883/ADO_AI-01_or74hj.png" alt="ART de ONE"
        class="nav-logo" id="navLogo">
    </a>
    <button class="theme-btn" id="themeBtn" aria-label="Toggle theme">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round">
        <circle cx="12" cy="12" r="5" />
        <line x1="12" y1="1" x2="12" y2="3" />
        <line x1="12" y1="21" x2="12" y2="23" />
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
        <line x1="1" y1="12" x2="3" y2="12" />
        <line x1="21" y1="12" x2="23" y2="12" />
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
      </svg>
    </button>
  </nav>

  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-header">
        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-sub">ART de ONE AI Provider</p>
      </div>

      <button class="btn btn-social" id="btnGoogle">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
            fill="#4285F4" />
          <path
            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
            fill="#34A853" />
          <path
            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
            fill="#FBBC05" />
          <path
            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
            fill="#EA4335" />
        </svg>
        Continue with Google
      </button>

      <div class="divider">or</div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input type="email" id="email" class="form-input" placeholder="youremail@gmail.com" required>
        </div>

        <div class="form-group">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
            <label class="form-label" for="password" style="margin-bottom: 0;">Password</label>
            <a href="#" id="forgotPasswordLink" style="font-size: 12px; color: var(--text-sub);">Forgot password?</a>
          </div>
          <input type="password" id="password" class="form-input" placeholder="••••••••" required>
        </div>

        <div id="errorMsg"></div>

        <button type="submit" class="btn btn-primary" id="btnSubmit">
          Sign In
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round">
            <line x1="5" y1="12" x2="19" y2="12" />
            <polyline points="12 5 19 12 12 19" />
          </svg>
        </button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Sign up</a>
      </div>
    </div>
  </div>

  <script>
    // Theme toggle
    const moonSvg = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
    const sunSvg = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`;

    const lightLogo = 'https://res.cloudinary.com/dy7vubtji/image/upload/v1774451883/ADO_AI-02_lnmqny.png';
    const darkLogo = 'https://res.cloudinary.com/dy7vubtji/image/upload/v1774451883/ADO_AI-01_or74hj.png';
    function syncLogo() {
      const logo = document.getElementById('navLogo');
      if (logo) logo.src = isDark() ? darkLogo : lightLogo;
    }
    function isDark() { return document.documentElement.dataset.theme === 'dark'; }
    function setTheme(dark) {
      document.documentElement.dataset.theme = dark ? 'dark' : 'light';
      localStorage.setItem('ado_theme', dark ? 'dark' : 'light');
      document.getElementById('themeBtn').innerHTML = dark ? sunSvg : moonSvg;
      syncLogo();
    }

    const savedTheme = localStorage.getItem('ado_theme');
    if (savedTheme) setTheme(savedTheme === 'dark');
    else setTheme(true);
    document.getElementById('themeBtn').innerHTML = isDark() ? sunSvg : moonSvg;
    syncLogo();
    document.getElementById('themeBtn').addEventListener('click', () => setTheme(!isDark()));
  </script>

  <script type="module">
    import { supabase } from './js/supabase.js';

    const loginForm = document.getElementById('loginForm');
    const btnSubmit = document.getElementById('btnSubmit');
    const errorMsg = document.getElementById('errorMsg');
    const btnGoogle = document.getElementById('btnGoogle');

    // Check if already logged in
    supabase.auth.getSession().then(({ data: { session } }) => {
      if (session) {
        window.location.href = 'index.html';
      }
    });

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      btnSubmit.disabled = true;
      btnSubmit.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="animation: spin 1s linear infinite;"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> Signing in...`;
      errorMsg.style.display = 'none';

      try {
        const { data, error } = await supabase.auth.signInWithPassword({
          email,
          password,
        });

        if (error) throw error;

        // Success - redirect
        const urlParams = new URLSearchParams(window.location.search);
        const redirect = urlParams.get('redirect') || 'index.html';
        window.location.href = redirect;

      } catch (error) {
        errorMsg.textContent = error.message || 'Failed to sign in. Please check your credentials.';
        errorMsg.style.display = 'block';
        btnSubmit.disabled = false;
        btnSubmit.innerHTML = `Sign In <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>`;
      }
    });

    btnGoogle.addEventListener('click', async () => {
      try {
        const { data, error } = await supabase.auth.signInWithOAuth({
          provider: 'google',
          options: {
            redirectTo: window.location.origin + '/index.html'
          }
        });
        if (error) throw error;
      } catch (error) {
        errorMsg.textContent = error.message || 'Failed to sign in with Google.';
        errorMsg.style.display = 'block';
      }
    });

    // Forgot password
    document.getElementById('forgotPasswordLink').addEventListener('click', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      if (!email) {
        errorMsg.textContent = 'Please enter your email address first.';
        errorMsg.style.display = 'block';
        return;
      }
      try {
        const { error } = await supabase.auth.resetPasswordForEmail(email, {
          redirectTo: window.location.origin + '/reset-password.html',
        });
        if (error) throw error;
        errorMsg.style.display = 'none';
        // Reuse errorMsg element as success (green)
        const msg = document.getElementById('errorMsg');
        msg.textContent = 'Password reset email sent. Please check your inbox.';
        msg.style.color = '#22c55e';
        msg.style.display = 'block';
      } catch (error) {
        errorMsg.textContent = error.message || 'Failed to send reset email.';
        errorMsg.style.color = '#ef4444';
        errorMsg.style.display = 'block';
      }
    });
  </script>
  <style>
    @keyframes spin {
      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</body>

</html>
